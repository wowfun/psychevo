schema_version = 5
id = "pidx-command-patch-add"
name = "pidx command patch-add"

[benchmark]
path = "../benchmarks/pidx-coding/benchmark.toml"

[select]
agents = ["local-solver"]
sets = ["pidx/smoke"]
tasks = ["pidx/patch-add"]

[[agents]]
id = "local-solver"
name = "Local solver"
kind = "command"

[agents.command]
command = "sh"
args = ["-c", """
cat > add.py <<'PY'
def add(a, b):
    return a + b
PY
"""]
timeout_seconds = 600
