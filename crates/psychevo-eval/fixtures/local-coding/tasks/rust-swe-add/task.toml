schema_version = 1
id = "rust-swe-add"
name = "Repair the add function"
kind = "swe-style"

[prompt]
text = "The local Rust crate has a failing unit test because add subtracts instead of adding. Fix the implementation so the tests pass."

[workspace]
source = "workspace"

[scorer]
command = ["sh", "scripts/score.sh"]
timeout_seconds = 30

[fake.pass]
command = ["sh", "scripts/fake-pass.sh"]
timeout_seconds = 5

[fake.fail]
command = ["sh", "scripts/fake-fail.sh"]
timeout_seconds = 5
