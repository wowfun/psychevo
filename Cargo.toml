[workspace]
members = [
    "crates/psychevo-ai",
    "crates/psychevo-agent-core",
    "crates/psychevo-runtime",
    "crates/psychevo-cli",
]
resolver = "3"

[workspace.package]
edition = "2024"
rust-version = "1.94"
license = "MIT"

[workspace.dependencies]
anyhow = "1.0"
bytes = "1.9"
clap = { version = "4.5", features = ["derive"] }
crossterm = "0.29"
futures = "0.3"
jsonc-parser = { version = "0.32.3", features = ["serde"] }
insta = "1"
pretty_assertions = "1.4"
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "rustls-tls"] }
ratatui = "0.30.0"
ratatui-textarea = "0.9.1"
rusqlite = { version = "0.32", features = ["bundled"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
similar = "2.6"
tempfile = "3.15"
thiserror = "2.0"
tokio = { version = "1.42", features = ["rt-multi-thread", "macros", "sync", "process", "time", "io-util"] }
unicode-width = "0.2"
uuid = { version = "1.11", features = ["v7", "serde"] }
